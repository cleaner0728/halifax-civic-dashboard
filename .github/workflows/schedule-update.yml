name: 15-Minute Auto Update Scheduler

# 配置触发条件 (Trigger Conditions)
on:
  # 1. 定时触发器 (CRON Scheduler)
  # GitHub Actions 的 CRON 语法遵循 UTC 时间。"*/15 * * * *" 代表每小时内的每隔 15 分钟准时执行一次
  schedule:
    - cron: '*/15 * * * *'
  
  # 2. 手动触发器 (Manual Trigger)
  # 方便我们在 GitHub 网页后台随时点击按钮手动测试运行
  workflow_dispatch:

jobs:
  trigger-vercel-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Send Trigger Request to Vercel Deploy Hook
        # 使用 Linux 系统自带的 curl 工具静默发起 POST 请求，并打印纯英文的成功状态码日志
        run: |
          echo "[Auto Scheduler] Triggering Vercel deployment update..."
          curl -s -X POST "https://api.vercel.com/v1/integrations/deploy/prj_ATSepIy0SNC3srCAlR7jDQhsueuB/oZaaOWG2Fw"
          echo ""
          echo "[Auto Scheduler] Trigger request sent successfully."