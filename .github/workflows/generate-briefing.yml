name: Generate news briefing

# Pings the deployed app's generate endpoint, which fetches full article
# text, summarizes (Groq Llama 3.3 70B), synthesizes audio (Microsoft Edge
# Read Aloud / Azure Neural Voice), and stores the result in Supabase. Used
# instead of Vercel Cron because the Hobby plan caps cron at once-per-day;
# GitHub Actions has no such limit.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   BRIEFING_BASE_URL  the deployed origin, no trailing slash, e.g.
#                      https://halifax-civic-dashboard.vercel.app
#   CRON_SECRET        same value set in the Vercel project's env vars
#                      (optional — only enforced if Vercel also has CRON_SECRET)

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:          # allow manual runs from the Actions tab

concurrency:
  group: generate-briefing
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger briefing generation
        run: |
          # -L follows redirects as a safety net, but BRIEFING_BASE_URL must
          # point at the canonical domain (e.g. https://dash.halifaxtalk.cc):
          # a cross-host redirect would make curl drop the Authorization header.
          resp=$(curl -fsSL -X POST \
            "${{ secrets.BRIEFING_BASE_URL }}/api/news-briefing/generate" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 90 \
            -w "\nHTTP %{http_code}")
          echo "$resp"
          # A 200 is not enough — the endpoint returns 200 on no-ops and even
          # prints a redirect body. Require an explicit ok:true so a silent
          # no-op turns the check red instead of green.
          echo "$resp" | grep -q '"ok":true' \
            || { echo "::error::briefing generate did not return ok:true"; exit 1; }
