name: Generate news briefing

# Pings the deployed app's generate endpoint, which fetches full article
# text, summarizes (Gemini), synthesizes audio (Chirp 3 HD), and stores the
# result in Supabase. Used instead of Vercel Cron because the Hobby plan caps
# cron at once-per-day; GitHub Actions has no such limit.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   BRIEFING_BASE_URL  e.g. https://made-in-halifax.vercel.app
#   CRON_SECRET        same value set in the Vercel project's env vars

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:          # allow manual runs from the Actions tab

concurrency:
  group: generate-briefing
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger briefing generation
        run: |
          curl -fsS -X POST \
            "${{ secrets.BRIEFING_BASE_URL }}/api/news-briefing/generate" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 90 \
            -w "\nHTTP %{http_code}\n"
