name: Backfill Gas Price History

on:
  workflow_dispatch:   # manual trigger only — run once to seed historical data

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pdftotext
        run: sudo apt-get install -y poppler-utils

      - name: Backfill historical gas prices
        run: node scripts/backfill-gas-prices.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain public/gas-prices.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/gas-prices.json
            git commit -m "chore: backfill gas price history [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
