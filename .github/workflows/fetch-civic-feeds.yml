name: Refresh civic feeds

# Pings the deployed app's civic-feeds refresh endpoint, which scrapes the
# four City Live feeds (ferry / transit / incidents / hrm_news) and upserts
# them into the Supabase `civic_updates` table. Same GitHub-Actions-as-cron
# pattern as generate-briefing (Vercel Hobby caps cron at once/day).
#
# Reuses the existing repo secrets:
#   BRIEFING_BASE_URL  deployed origin, no trailing slash, canonical domain
#   CRON_SECRET        same value set in the Vercel project's env vars
#                      (optional — only enforced if Vercel also has CRON_SECRET)

on:
  schedule:
    - cron: '*/20 * * * *'   # every 20 minutes
  workflow_dispatch:          # allow manual runs from the Actions tab

concurrency:
  group: fetch-civic-feeds
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger civic-feeds refresh
        run: |
          resp=$(curl -fsSL -X POST \
            "${{ secrets.BRIEFING_BASE_URL }}/api/civic-feeds/refresh" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 90 \
            -w "\nHTTP %{http_code}")
          echo "$resp"
          # Require an explicit ok:true so a silent failure turns the check red.
          echo "$resp" | grep -q '"ok":true' \
            || { echo "::error::civic-feeds refresh did not return ok:true"; exit 1; }
